<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lifelog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root[data-theme="dark"] {
      --bg:     #070a12; --bg2:  #0d1117; --panel: #111827;
      --border: #1e2a3a; --text: #e2e8f0; --text2: #94a3b8; --accent: #3b82f6;
      --hm0: #161b22; --hm1: #0e3a2a; --hm2: #006d32; --hm3: #26a641; --hm4: #39d353;
    }
    :root[data-theme="light"] {
      --bg:     #f8fafc; --bg2:  #f1f5f9; --panel: #ffffff;
      --border: #e2e8f0; --text: #0f172a; --text2: #64748b; --accent: #2563eb;
      --hm0: #ebedf0; --hm1: #9be9a8; --hm2: #40c463; --hm3: #30a14e; --hm4: #216e39;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* Header */
    header {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px; background: var(--bg2);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .logo { font-weight: 700; font-size: 17px; color: var(--accent); letter-spacing: -.5px; margin-right: 4px; }
    .date-nav { display: flex; align-items: center; gap: 5px; }
    .nav-btn {
      background: var(--panel); border: 1px solid var(--border); color: var(--text);
      border-radius: 5px; padding: 3px 9px; cursor: pointer; font-size: 13px; transition: background .12s;
    }
    .nav-btn:hover { background: var(--border); }
    #date-display { font-size: 13px; font-weight: 500; min-width: 122px; text-align: center; }
    .tabs { display: flex; gap: 2px; margin-left: 6px; }
    .tab-btn {
      background: transparent; border: none; color: var(--text2);
      padding: 5px 12px; border-radius: 5px; cursor: pointer;
      font-size: 13px; font-weight: 500; transition: all .12s;
    }
    .tab-btn:hover { background: var(--panel); color: var(--text); }
    .tab-btn.active { background: var(--accent); color: #fff; }
    .kbd { font-size: 9px; opacity: .7; border: 1px solid currentColor; border-radius: 3px; padding: 0 3px; margin-left: 3px; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    #last-updated { font-size: 11px; color: var(--text2); }
    .icon-btn {
      background: var(--panel); border: 1px solid var(--border); color: var(--text2);
      border-radius: 5px; padding: 4px 9px; cursor: pointer; font-size: 12px; transition: all .12s;
    }
    .icon-btn:hover { color: var(--text); background: var(--border); }

    /* Layout */
    main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .tab-content { display: none; flex: 1; overflow: hidden; flex-direction: column; padding: 10px; gap: 10px; }
    .tab-content.active { display: flex; }

    /* Stats row */
    .stats-row { display: flex; gap: 8px; flex-shrink: 0; }
    .stat-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 9px; padding: 10px 14px; flex: 1;
    }
    .stat-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
    .stat-value { font-size: 20px; font-weight: 700; margin-top: 3px; line-height: 1.1; }
    .stat-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .focus-bar { height: 3px; background: var(--bg2); border-radius: 2px; margin-top: 5px; overflow: hidden; }
    .focus-bar-fill { height: 100%; background: #10b981; border-radius: 2px; transition: width .5s ease; }

    /* Panel */
    .panel {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 9px; padding: 12px; display: flex; flex-direction: column;
    }
    .panel-title {
      font-size: 11px; font-weight: 600; color: var(--text2);
      text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; flex-shrink: 0;
    }

    /* Charts row */
    .charts-row { display: flex; gap: 10px; flex: 1; overflow: hidden; min-height: 0; }
    .donut-panel { width: 200px; flex-shrink: 0; }
    .donut-wrap { position: relative; flex: 1; min-height: 0; }
    .donut-center {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      text-align: center; pointer-events: none;
    }
    .donut-center-val { font-size: 16px; font-weight: 700; }
    .donut-center-lbl { font-size: 10px; color: var(--text2); }
    .legend { margin-top: 6px; flex-shrink: 0; overflow-y: auto; }
    .legend-item { display: flex; align-items: center; gap: 6px; padding: 2px 0; font-size: 12px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .legend-name { flex: 1; }
    .legend-time { color: var(--text2); font-size: 11px; }

    .right-panels { flex: 1; display: flex; flex-direction: column; gap: 10px; min-height: 0; overflow: hidden; }
    .gantt-panel { height: 220px; flex-shrink: 0; }
    .gantt-wrap { flex: 1; min-height: 0; overflow-y: auto; }

    /* Table */
    .table-panel { flex: 1; min-height: 0; }
    .table-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-shrink: 0; }
    .table-wrap { flex: 1; overflow-y: auto; min-height: 0; }
    .table-wrap::-webkit-scrollbar { width: 4px; }
    .table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th {
      position: sticky; top: 0; background: var(--panel); color: var(--text2);
      font-weight: 500; text-align: left; padding: 5px 7px;
      border-bottom: 1px solid var(--border); font-size: 11px;
    }
    td { padding: 4px 7px; border-bottom: 1px solid var(--border); }
    tr.clickable:hover td { background: var(--bg2); cursor: pointer; }
    tr.clickable.expanded td { border-bottom: none; background: var(--bg2); }
    .cat-badge { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 10px; font-weight: 500; }
    .idle-badge { display: inline-block; padding: 1px 5px; border-radius: 10px; font-size: 10px; background: var(--border); color: var(--text2); margin-left: 4px; }
    /* Expanded detail row */
    .expand-row td { padding: 5px 10px 10px 18px; background: var(--bg2); border-bottom: 1px solid var(--border); border-left: 2px solid var(--accent); }
    .expand-grid { display: grid; grid-template-columns: 80px 1fr; gap: 3px 10px; font-size: 11px; }
    .expand-key { color: var(--text2); padding-top: 1px; }
    .expand-val { word-break: break-all; }
    .export-row { display: flex; gap: 5px; }
    .export-btn {
      background: var(--bg2); border: 1px solid var(--border); color: var(--text2);
      border-radius: 5px; padding: 3px 8px; font-size: 11px; cursor: pointer; transition: all .12s;
    }
    .export-btn:hover { color: var(--text); background: var(--border); }

    /* Column filter row */
    .filter-row th { padding: 3px 4px; background: var(--panel); }
    .col-filter {
      width: 100%; background: var(--bg2); border: 1px solid var(--border); color: var(--text);
      border-radius: 4px; padding: 3px 6px; font-size: 11px; font-family: inherit;
      outline: none; box-sizing: border-box;
    }
    .col-filter:focus { border-color: var(--accent); }
    .col-filter::placeholder { color: var(--text2); opacity: .7; }
    select.col-filter { cursor: pointer; padding-right: 2px; }
    .filter-count { font-size: 11px; color: var(--text2); white-space: nowrap; }

    /* Weekly */
    .weekly-layout { flex: 1; display: flex; flex-direction: column; gap: 10px; overflow: hidden; }
    .weekly-chart-panel { flex: 1; min-height: 0; }
    .chart-wrap { flex: 1; min-height: 0; position: relative; }
    .weekly-stats-panel { height: 185px; }

    /* Heatmap */
    .heatmap-layout { flex: 1; overflow-y: auto; padding: 4px; }
    .heatmap-legend { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); padding: 0 4px 10px; }
    .hm-swatch { width: 11px; height: 11px; border-radius: 2px; }
    .heatmap-months { display: flex; flex-wrap: wrap; gap: 20px; padding: 0 4px 16px; }
    .hm-month { flex-shrink: 0; }
    .hm-month-title { font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
    .hm-grid { display: grid; grid-template-columns: repeat(7, 13px); gap: 2px; }
    .hm-day-hdr { font-size: 9px; color: var(--text2); text-align: center; line-height: 13px; }
    .hm-cell {
      width: 13px; height: 13px; border-radius: 2px;
      background: var(--hm0); cursor: pointer; transition: transform .1s;
    }
    .hm-cell:hover { transform: scale(1.35); z-index: 10; position: relative; }
    .hm-cell[data-lv="1"] { background: var(--hm1); }
    .hm-cell[data-lv="2"] { background: var(--hm2); }
    .hm-cell[data-lv="3"] { background: var(--hm3); }
    .hm-cell[data-lv="4"] { background: var(--hm4); }
    .hm-cell.empty { background: transparent; cursor: default; pointer-events: none; }

    /* Detail panel */
    #detail-panel {
      position: fixed; right: -360px; top: 0; bottom: 0; width: 340px;
      background: var(--panel); border-left: 1px solid var(--border);
      padding: 16px; transition: right .25s ease; z-index: 100;
      overflow-y: auto; display: flex; flex-direction: column; gap: 14px;
    }
    #detail-panel.open { right: 0; }
    .detail-close {
      position: absolute; top: 12px; right: 12px; background: none; border: none;
      color: var(--text2); cursor: pointer; font-size: 20px; line-height: 1;
    }
    .detail-close:hover { color: var(--text); }
    #detail-panel h3 { font-size: 15px; font-weight: 600; padding-right: 24px; }
    .d-label { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
    .d-value { font-size: 13px; word-break: break-all; }

    /* Tooltip */
    #tooltip {
      position: fixed; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 9px; font-size: 11px;
      pointer-events: none; z-index: 200; display: none; white-space: nowrap;
    }

    /* Misc */
    .empty-state { text-align: center; color: var(--text2); font-size: 14px; padding: 30px 0; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <span class="logo">lifelog</span>

  <div class="date-nav">
    <button class="nav-btn" id="btn-prev">&#8592;</button>
    <span id="date-display">---</span>
    <button class="nav-btn" id="btn-next">&#8594;</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="today">今日<span class="kbd">1</span></button>
    <button class="tab-btn" data-tab="weekly">週間<span class="kbd">2</span></button>
    <button class="tab-btn" data-tab="heatmap">ヒートマップ<span class="kbd">3</span></button>
  </div>

  <div class="header-right">
    <span id="last-updated"></span>
    <button class="icon-btn" id="theme-btn">☀️</button>
  </div>
</header>

<main>

  <!-- ===== TODAY ===== -->
  <div class="tab-content active" id="tab-today">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">アクティブ時間</div>
        <div class="stat-value" id="s-total">--</div>
        <div class="stat-sub" id="s-sess-sub">-- セッション</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">フォーカス率</div>
        <div class="stat-value" id="s-focus">--%</div>
        <div class="focus-bar"><div class="focus-bar-fill" id="focus-fill" style="width:0"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">トップカテゴリ</div>
        <div class="stat-value" id="s-top-cat" style="font-size:15px">--</div>
        <div class="stat-sub" id="s-top-cat-t"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">最長アプリ</div>
        <div class="stat-value" id="s-top-app" style="font-size:13px;padding-top:2px">--</div>
        <div class="stat-sub" id="s-top-app-t"></div>
      </div>
    </div>

    <div class="charts-row">
      <div class="panel donut-panel">
        <div class="panel-title">カテゴリ別</div>
        <div class="donut-wrap">
          <canvas id="donut-chart"></canvas>
          <div class="donut-center">
            <div class="donut-center-val" id="donut-total">--</div>
            <div class="donut-center-lbl">合計</div>
          </div>
        </div>
        <div class="legend" id="legend"></div>
      </div>

      <div class="right-panels">
        <div class="panel gantt-panel">
          <div class="panel-title">タイムライン</div>
          <div class="gantt-wrap"><canvas id="gantt-chart"></canvas></div>
        </div>

        <div class="panel table-panel">
          <div class="table-header">
            <div class="panel-title" style="margin-bottom:0">セッション一覧 <span class="filter-count" id="filter-count"></span></div>
            <div class="export-row">
              <button class="export-btn" onclick="exportCSV()">&#8595; CSV</button>
              <button class="export-btn" onclick="exportJSON()">&#8595; JSON</button>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>時刻</th><th>アプリ</th><th>カテゴリ</th><th>時間</th><th>タイトル / URL</th><th></th>
                </tr>
                <tr class="filter-row">
                  <th><input class="col-filter" id="f-time" placeholder="例: 14:00"></th>
                  <th><input class="col-filter" id="f-app"  placeholder="絞り込み..."></th>
                  <th><select class="col-filter" id="f-cat"><option value="">すべて</option></select></th>
                  <th><input class="col-filter" id="f-dur"  placeholder="N分以上"></th>
                  <th><input class="col-filter" id="f-title" placeholder="絞り込み..."></th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="session-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== WEEKLY ===== -->
  <div class="tab-content" id="tab-weekly">
    <div class="weekly-layout">
      <div class="panel weekly-chart-panel">
        <div class="panel-title">週間カテゴリ別時間</div>
        <div class="chart-wrap"><canvas id="weekly-chart"></canvas></div>
      </div>
      <div class="panel weekly-stats-panel">
        <div class="panel-title">日別サマリー</div>
        <div class="table-wrap">
          <table>
            <thead><tr id="weekly-thead"></tr></thead>
            <tbody id="weekly-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== HEATMAP ===== -->
  <div class="tab-content" id="tab-heatmap">
    <div class="heatmap-layout">
      <div class="heatmap-legend">
        <span>少ない</span>
        <div class="hm-swatch" style="background:var(--hm0)"></div>
        <div class="hm-swatch" style="background:var(--hm1)"></div>
        <div class="hm-swatch" style="background:var(--hm2)"></div>
        <div class="hm-swatch" style="background:var(--hm3)"></div>
        <div class="hm-swatch" style="background:var(--hm4)"></div>
        <span>多い (&lt;1h / 1–3h / 3–6h / 6h+)</span>
      </div>
      <div class="heatmap-months" id="heatmap-months"></div>
    </div>
  </div>

</main>

<!-- Detail panel -->
<div id="detail-panel">
  <button class="detail-close" onclick="closeDetail()">&#215;</button>
  <h3 id="d-title">セッション詳細</h3>
  <div><div class="d-label">アプリ</div><div class="d-value" id="d-app"></div></div>
  <div><div class="d-label">カテゴリ</div><div class="d-value" id="d-cat"></div></div>
  <div><div class="d-label">時間帯</div><div class="d-value" id="d-time"></div></div>
  <div><div class="d-label">経過時間</div><div class="d-value" id="d-dur"></div></div>
  <div><div class="d-label">ウィンドウタイトル</div><div class="d-value" id="d-wintitle"></div></div>
  <div id="d-url-row"><div class="d-label">URL</div><div class="d-value" id="d-url"></div></div>
</div>

<div id="tooltip"></div>

<script>
// ================================================================
// State
// ================================================================
const localDateStr = d => [
  d.getFullYear(),
  String(d.getMonth() + 1).padStart(2, '0'),
  String(d.getDate()).padStart(2, '0'),
].join('-');
const todayStr = () => localDateStr(new Date());
let currentDate = todayStr();
let currentTab  = 'today';
let theme       = localStorage.getItem('ll-theme') || 'dark';
let charts      = {};
let sessions    = [];
let catMeta     = {};

applyTheme(theme);

// ================================================================
// Utils
// ================================================================
function fmtS(s) {
  if (!s) return '--';
  if (s < 60)   return s + '秒';
  if (s < 3600) return Math.floor(s / 60) + '分';
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return m ? `${h}時間${m}分` : `${h}時間`;
}
function fmtTime(iso) { return iso ? iso.slice(11, 16) : ''; }
function fmtDateLabel(d) {
  const dt  = new Date(d + 'T00:00:00');
  const dow = ['日','月','火','水','木','金','土'][dt.getDay()];
  return `${dt.getMonth()+1}/${dt.getDate()}(${dow})`;
}
function isToday(d) { return d === todayStr(); }
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ================================================================
// Date navigation
// ================================================================
function setDate(d) {
  currentDate = d;
  const lbl = isToday(d) ? `今日 ${fmtDateLabel(d)}` : fmtDateLabel(d);
  document.getElementById('date-display').textContent = lbl;
  loadCurrentTab();
}
function navDate(delta) {
  const [y, m, d] = currentDate.split('-').map(Number);
  setDate(localDateStr(new Date(y, m - 1, d + delta)));
}
document.getElementById('btn-prev').onclick  = e => { e.currentTarget.blur(); navDate(-1); };
document.getElementById('btn-next').onclick  = e => { e.currentTarget.blur(); navDate(1);  };

// ================================================================
// Tab switching
// ================================================================
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  loadCurrentTab();
}
document.querySelectorAll('.tab-btn').forEach(b => b.onclick = () => {
  if (b.dataset.tab === 'today') currentDate = todayStr();
  switchTab(b.dataset.tab);
});
function loadCurrentTab() {
  if      (currentTab === 'today')   loadToday();
  else if (currentTab === 'weekly')  loadWeekly();
  else if (currentTab === 'heatmap') loadHeatmap();
}

// ================================================================
// Theme
// ================================================================
function applyTheme(t) {
  theme = t;
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-btn').textContent = t === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('ll-theme', t);
}
document.getElementById('theme-btn').onclick = () => {
  applyTheme(theme === 'dark' ? 'light' : 'dark');
  loadCurrentTab();
};

// ================================================================
// API
// ================================================================
async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`${r.status} ${path}`);
  return r.json();
}

// ================================================================
// TODAY
// ================================================================
let _loadTodayReq = 0;
async function loadToday() {
  const reqId = ++_loadTodayReq;
  const dateSnap = currentDate;
  try {
    const [cat, sess] = await Promise.all([
      api(`/api/category_summary?date=${dateSnap}`),
      api(`/api/sessions?date=${dateSnap}`),
    ]);
    if (reqId !== _loadTodayReq) return; // 古いリクエストは無視
    sessions = sess;
    catMeta  = cat.categories;
    updateStats(cat, sess);
    renderDonut(cat);
    renderGantt(sess);
    renderTable(sess);
    document.getElementById('last-updated').textContent =
      '更新 ' + new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
  } catch(e) { console.error('loadToday:', e); }
}

function updateStats(cat, sess) {
  document.getElementById('s-total').textContent    = fmtS(cat.total_active_s || 0);
  document.getElementById('s-sess-sub').textContent = sess.length + ' セッション';
  document.getElementById('s-focus').textContent    = (cat.focus_score || 0) + '%';
  document.getElementById('focus-fill').style.width = (cat.focus_score || 0) + '%';

  let topCatKey = null, topCatS = 0;
  for (const [k, v] of Object.entries(cat.categories)) {
    if (v.total_s > topCatS) { topCatS = v.total_s; topCatKey = k; }
  }
  if (topCatKey) {
    document.getElementById('s-top-cat').textContent   = cat.categories[topCatKey].label;
    document.getElementById('s-top-cat-t').textContent = fmtS(topCatS);
  }

  const appDur = {};
  sess.filter(s => !s.idle).forEach(s => {
    appDur[s.app_name] = (appDur[s.app_name] || 0) + s.duration_s;
  });
  const entries = Object.entries(appDur);
  if (entries.length) {
    const [app, dur] = entries.sort((a,b) => b[1]-a[1])[0];
    document.getElementById('s-top-app').textContent   = app;
    document.getElementById('s-top-app-t').textContent = fmtS(dur);
  }
}

function renderDonut(cat) {
  const keys   = Object.keys(cat.categories).filter(k => cat.categories[k].total_s > 0);
  const labels = keys.map(k => cat.categories[k].label);
  const data   = keys.map(k => cat.categories[k].total_s);
  const colors = keys.map(k => cat.categories[k].color);

  if (charts.donut) charts.donut.destroy();
  charts.donut = new Chart(document.getElementById('donut-chart'), {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 0, hoverOffset: 4 }] },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '68%',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => ` ${fmtS(c.raw)}` } }
      }
    }
  });
  document.getElementById('donut-total').textContent = fmtS(cat.total_active_s);

  document.getElementById('legend').innerHTML = keys.map(k => `
    <div class="legend-item">
      <div class="legend-dot" style="background:${cat.categories[k].color}"></div>
      <span class="legend-name">${cat.categories[k].label}</span>
      <span class="legend-time">${fmtS(cat.categories[k].total_s)}</span>
    </div>`).join('');
}

function renderGantt(sess) {
  const wrap = document.querySelector('.gantt-wrap');
  wrap.innerHTML = '<canvas id="gantt-chart"></canvas>';
  const active = sess.filter(s => !s.idle);
  if (!active.length) return;

  const canvas = document.getElementById('gantt-chart');
  const ctx    = canvas.getContext('2d');

  const parseH = iso => {
    const [h, m, s] = iso.slice(11,19).split(':').map(Number);
    return h + m/60 + s/3600;
  };
  const fmt = v => `${Math.floor(v)}:${String(Math.round((v%1)*60)).padStart(2,'0')}`;

  // アプリ別合計時間でソートし上位12
  const appDur = {};
  active.forEach(s => { appDur[s.app_name] = (appDur[s.app_name] || 0) + s.duration_s; });
  const apps     = Object.entries(appDur).sort((a,b) => b[1]-a[1]).slice(0,12).map(e => e[0]);
  const filtered = active.filter(s => apps.includes(s.app_name));

  const starts = filtered.map(s => parseH(s.started_at));
  const ends   = filtered.map(s => parseH(s.ended_at));
  const minH   = Math.max(0,  Math.min(...starts) - 0.25);
  const maxH   = Math.min(24, Math.max(...ends)   + 0.25);

  // レイアウト
  const LABEL_W = 110, ROW_H = 22, BAR_H = 13, HDR_H = 18;
  const W = wrap.clientWidth || 400;
  const H = HDR_H + apps.length * ROW_H;
  canvas.style.display = 'block';
  canvas.width  = W;
  canvas.height = H;
  const chartW  = W - LABEL_W;
  const toX = t => LABEL_W + (t - minH) / (maxH - minH) * chartW;

  const tc = theme === 'dark' ? '#94a3b8' : '#64748b';
  const gc = theme === 'dark' ? '#1e2a3a33' : '#e2e8f033';
  const bg = theme === 'dark' ? '#111827'  : '#ffffff';

  // 背景
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // グリッド・時刻ラベル
  ctx.font = '10px Inter,sans-serif';
  ctx.textAlign = 'center';
  for (let h = Math.ceil(minH); h <= Math.floor(maxH); h++) {
    const x = toX(h);
    ctx.strokeStyle = gc; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, HDR_H); ctx.lineTo(x, H); ctx.stroke();
    ctx.fillStyle = tc;
    ctx.fillText(`${h}:00`, x, HDR_H - 4);
  }

  // 行・バー
  const hitAreas = [];
  apps.forEach((app, i) => {
    const rowY = HDR_H + i * ROW_H;
    if (i % 2 === 0) {
      ctx.fillStyle = theme === 'dark' ? '#ffffff08' : '#00000008';
      ctx.fillRect(LABEL_W, rowY, chartW, ROW_H);
    }
    ctx.fillStyle = tc;
    ctx.textAlign = 'right';
    ctx.font = '10px Inter,sans-serif';
    ctx.fillText(app.length > 16 ? app.slice(0,15)+'…' : app, LABEL_W - 6, rowY + ROW_H/2 + 4);

    filtered.filter(s => s.app_name === app).forEach(s => {
      const st  = parseH(s.started_at);
      const en  = Math.max(parseH(s.ended_at), st + 1/60);
      const x1  = toX(st), x2 = toX(en);
      const bw  = Math.max(3, x2 - x1);
      const by  = rowY + (ROW_H - BAR_H) / 2;
      const col = (catMeta[s.category] || {}).color || '#4b607a';
      ctx.fillStyle   = col + 'cc';
      ctx.strokeStyle = col;
      ctx.lineWidth   = 1;
      ctx.beginPath();
      ctx.roundRect(x1, by, bw, BAR_H, 3);
      ctx.fill(); ctx.stroke();
      hitAreas.push({ x1, x2: x1+bw, y1: by, y2: by+BAR_H, s });
    });
  });

  // ツールチップ
  const tt = document.getElementById('tooltip');
  canvas.onmousemove = e => {
    const r   = canvas.getBoundingClientRect();
    const mx  = e.clientX - r.left, my = e.clientY - r.top;
    const hit = hitAreas.find(a => mx>=a.x1 && mx<=a.x2 && my>=a.y1 && my<=a.y2);
    if (hit) {
      const st = parseH(hit.s.started_at), en = parseH(hit.s.ended_at);
      const info = hit.s.url
        ? `<span style="color:var(--accent)">${escHtml(hit.s.url.slice(0, 60))}</span>`
        : hit.s.win_title ? escHtml(hit.s.win_title.slice(0, 60)) : '';
      tt.innerHTML = `<strong>${escHtml(hit.s.app_name)}</strong><br>${fmt(st)} ～ ${fmt(en)} (${fmtS(hit.s.duration_s)})${info ? `<br>${info}` : ''}`;
      tt.style.display = 'block';
      tt.style.left = (e.clientX + 12) + 'px';
      tt.style.top  = (e.clientY - 36) + 'px';
    } else {
      tt.style.display = 'none';
    }
  };
  canvas.onmouseleave = () => { tt.style.display = 'none'; };
}

function getFilteredSessions(sess) {
  const fTime  = document.getElementById('f-time').value.trim();
  const fApp   = document.getElementById('f-app').value.trim().toLowerCase();
  const fCat   = document.getElementById('f-cat').value;
  const fDur   = parseFloat(document.getElementById('f-dur').value) || 0;
  const fTitle = document.getElementById('f-title').value.trim().toLowerCase();

  return sess.filter(s => {
    if (fTime  && !fmtTime(s.started_at).includes(fTime)) return false;
    if (fApp   && !s.app_name.toLowerCase().includes(fApp)) return false;
    if (fCat   && s.category !== fCat) return false;
    if (fDur   && (s.duration_s || 0) < fDur * 60) return false;
    if (fTitle) {
      const hay = [s.win_title || '', s.url || ''].join(' ').toLowerCase();
      if (!hay.includes(fTitle)) return false;
    }
    return true;
  });
}

function populateCategoryFilter() {
  const sel = document.getElementById('f-cat');
  const cur = sel.value;
  sel.innerHTML = '<option value="">すべて</option>';
  const used = [...new Set(sessions.map(s => s.category).filter(Boolean))];
  used.forEach(k => {
    const lbl = (catMeta[k] || {}).label || k;
    sel.innerHTML += `<option value="${escHtml(k)}"${cur===k?' selected':''}>${escHtml(lbl)}</option>`;
  });
}

function renderTable(sess) {
  populateCategoryFilter();
  const filtered = getFilteredSessions(sess);
  const tbody = document.getElementById('session-tbody');
  document.getElementById('filter-count').textContent =
    filtered.length < sess.length ? `${filtered.length} / ${sess.length}件` : `${sess.length}件`;

  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="5" class="empty-state">${sess.length ? 'フィルター条件に一致するデータがありません' : 'データがありません'}</td></tr>`;
    return;
  }
  tbody.innerHTML = [...filtered].reverse().map(s => {
    const cm  = catMeta[s.category] || {};
    const col = cm.color || '#4b607a';
    const lbl = cm.label || s.category || 'その他';
    const timeRange = `${fmtTime(s.started_at)}<span style="color:var(--text2)"> ～ ${fmtTime(s.ended_at)}</span>`;
    const idleBadge = s.idle ? '<span class="idle-badge">idle</span>' : '';
    const info = s.url
      ? `<a href="${escHtml(s.url)}" target="_blank" onclick="event.stopPropagation()">${escHtml(s.url.slice(0,50))}</a>`
      : escHtml((s.win_title || '').slice(0, 50));
    return `<tr class="clickable" onclick="toggleExpand(this,${s.id})">
      <td style="white-space:nowrap">${timeRange}</td>
      <td>${escHtml(s.app_name)}${idleBadge}</td>
      <td><span class="cat-badge" style="background:${col}22;color:${col}">${lbl}</span></td>
      <td style="white-space:nowrap">${fmtS(s.duration_s)}</td>
      <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${info}</td>
      <td style="color:var(--text2);font-size:10px;white-space:nowrap">▶</td>
    </tr>`;
  }).join('');
}

// ================================================================
// EXPAND ROW
// ================================================================
function toggleExpand(tr, id) {
  const next = tr.nextElementSibling;
  if (next && next.classList.contains('expand-row')) {
    next.remove();
    tr.classList.remove('expanded');
    tr.querySelector('td:last-child').textContent = '▶';
    return;
  }
  // 他を閉じる
  document.querySelectorAll('.expand-row').forEach(r => r.remove());
  document.querySelectorAll('tr.expanded').forEach(r => {
    r.classList.remove('expanded');
    r.querySelector('td:last-child').textContent = '▶';
  });

  const s = sessions.find(x => x.id === id);
  if (!s) return;
  const cm  = catMeta[s.category] || {};
  const col = cm.color || '#4b607a';

  const rows = [
    ['時間帯',   `${fmtTime(s.started_at)} ～ ${fmtTime(s.ended_at)}`],
    ['経過時間', fmtS(s.duration_s)],
    ['カテゴリ', `<span class="cat-badge" style="background:${col}22;color:${col}">${escHtml(cm.label || s.category || 'その他')}</span>`],
    ['状態',     s.idle ? '<span class="idle-badge">アイドル</span>' : 'アクティブ'],
  ];
  if (s.win_title) rows.push(['タイトル', escHtml(s.win_title)]);
  if (s.url)       rows.push(['URL', `<a href="${escHtml(s.url)}" target="_blank" onclick="event.stopPropagation()">${escHtml(s.url)}</a>`]);

  const expTr = document.createElement('tr');
  expTr.className = 'expand-row';
  expTr.innerHTML = `<td colspan="6">
    <div class="expand-grid">
      ${rows.map(([k,v]) => `<span class="expand-key">${k}</span><span class="expand-val">${v}</span>`).join('')}
    </div>
  </td>`;
  tr.classList.add('expanded');
  tr.querySelector('td:last-child').textContent = '▼';
  tr.after(expTr);
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
}

// ================================================================
// WEEKLY
// ================================================================
async function loadWeekly() {
  try {
    const data = await api(`/api/weekly?date=${currentDate}`);
    renderWeeklyChart(data);
    renderWeeklyTable(data);
  } catch(e) { console.error('loadWeekly:', e); }
}

function renderWeeklyChart(data) {
  if (charts.weekly) charts.weekly.destroy();
  const textColor = theme === 'dark' ? '#94a3b8' : '#64748b';
  const gridColor = theme === 'dark' ? '#1e2a3a44' : '#e2e8f044';
  const catKeys   = Object.keys(data.categories).filter(k => data.categories[k].some(v => v > 0));

  charts.weekly = new Chart(document.getElementById('weekly-chart'), {
    type: 'bar',
    data: {
      labels: data.dates.map(fmtDateLabel),
      datasets: catKeys.map(k => ({
        label:           data.labels[k]?.label || k,
        data:            data.categories[k],
        backgroundColor: (data.labels[k]?.color || '#4b607a') + 'cc',
        borderColor:     data.labels[k]?.color || '#4b607a',
        borderWidth: 1, borderRadius: 3,
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', labels: { color: textColor, font: {size:11}, boxWidth: 11, padding: 10 } },
        tooltip: { callbacks: { label: c => ` ${c.dataset.label}: ${fmtS(c.raw)}` } }
      },
      scales: {
        x: { stacked: true, ticks: { color: textColor, font: {size:11} }, grid: { color: gridColor } },
        y: { stacked: true, ticks: { callback: v => fmtS(v), color: textColor, font: {size:10} }, grid: { color: gridColor } }
      },
      onClick: (_, els) => {
        if (els.length) { setDate(data.dates[els[0].index]); switchTab('today'); }
      }
    }
  });
}

function renderWeeklyTable(data) {
  const catKeys = Object.keys(data.categories).filter(k => data.categories[k].some(v => v > 0));

  document.getElementById('weekly-thead').innerHTML =
    '<th>日付</th>' + catKeys.map(k => `<th>${data.labels[k]?.label || k}</th>`).join('') + '<th>合計</th>';

  document.getElementById('weekly-tbody').innerHTML = data.dates.map((d, i) => {
    const vals  = catKeys.map(k => data.categories[k][i] || 0);
    const total = Object.values(data.categories).reduce((s, arr) => s + (arr[i] || 0), 0);
    return `<tr class="clickable" onclick="setDate('${d}');switchTab('today')">
      <td style="font-weight:500">${fmtDateLabel(d)}</td>
      ${vals.map(v => `<td>${v ? fmtS(v) : '--'}</td>`).join('')}
      <td style="font-weight:500">${total ? fmtS(total) : '--'}</td>
    </tr>`;
  }).join('');
}

// ================================================================
// HEATMAP
// ================================================================
async function loadHeatmap() {
  const end   = todayStr();
  const sDate = new Date(end + 'T00:00:00');
  sDate.setMonth(sDate.getMonth() - 5);
  sDate.setDate(1);
  const start = sDate.toISOString().slice(0, 10);
  try {
    const data = await api(`/api/heatmap?start=${start}&end=${end}`);
    renderHeatmap(data, start, end);
  } catch(e) { console.error('loadHeatmap:', e); }
}

function renderHeatmap(data, startDate, endDate) {
  const map = {};
  data.forEach(d => map[d.date] = d.total_s);

  const level = s => {
    if (!s)        return 0;
    if (s < 3600)  return 1;
    if (s < 10800) return 2;
    if (s < 21600) return 3;
    return 4;
  };

  const months = [];
  const cur  = new Date(startDate.slice(0,7) + '-01T00:00:00');
  const endD = new Date(endDate + 'T00:00:00');
  while (cur <= endD) {
    months.push({ y: cur.getFullYear(), m: cur.getMonth() });
    cur.setMonth(cur.getMonth() + 1);
  }

  const MON  = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const DOW  = ['月','火','水','木','金','土','日'];

  document.getElementById('heatmap-months').innerHTML = months.map(({ y, m }) => {
    const days  = new Date(y, m + 1, 0).getDate();
    const first = new Date(y, m, 1).getDay();
    const off   = (first + 6) % 7;

    let cells = Array(off).fill('<div class="hm-cell empty"></div>').join('');
    for (let day = 1; day <= days; day++) {
      const d  = `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const s  = map[d] || 0;
      cells += `<div class="hm-cell" data-lv="${level(s)}"
        onmouseenter="showTip(event,'${d}',${s})" onmouseleave="hideTip()"
        onclick="setDate('${d}');switchTab('today')"></div>`;
    }
    return `<div class="hm-month">
      <div class="hm-month-title">${y}年 ${MON[m]}</div>
      <div class="hm-grid">
        ${DOW.map(d => `<div class="hm-day-hdr">${d}</div>`).join('')}
        ${cells}
      </div>
    </div>`;
  }).join('');
}

// ================================================================
// TOOLTIP
// ================================================================
function showTip(e, d, s) {
  const tt = document.getElementById('tooltip');
  tt.innerHTML = `<strong>${d}</strong><br>${s ? fmtS(s) : 'データなし'}`;
  tt.style.display = 'block';
  tt.style.left    = (e.clientX + 12) + 'px';
  tt.style.top     = (e.clientY - 36) + 'px';
}
function hideTip() { document.getElementById('tooltip').style.display = 'none'; }

// ================================================================
// EXPORT
// ================================================================
function exportCSV()  { location.href = `/api/export/csv?date=${currentDate}`; }
function exportJSON() { location.href = `/api/export/json?date=${currentDate}`; }

// ================================================================
// KEYBOARD SHORTCUTS
// ================================================================
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA','BUTTON'].includes(e.target.tagName)) return;
  if (e.key === 'ArrowLeft')  { navDate(-1); return; }
  if (e.key === 'ArrowRight') { navDate(1);  return; }
  if (e.key === 't') { setDate(todayStr()); return; }
  if (e.key === '1') { switchTab('today');   return; }
  if (e.key === '2') { switchTab('weekly');  return; }
  if (e.key === '3') { switchTab('heatmap'); return; }
  if (e.key === 'Escape') closeDetail();
});

// ================================================================
// SESSION FILTER EVENTS
// ================================================================
['f-time','f-app','f-dur','f-title'].forEach(id =>
  document.getElementById(id).addEventListener('input', () => renderTable(sessions))
);
document.getElementById('f-cat').addEventListener('change', () => renderTable(sessions));

// AUTO REFRESH
// ================================================================
setInterval(() => {
  if (currentTab === 'today' && isToday(currentDate)) loadToday();
}, 30000);

// INIT

setDate(currentDate);
